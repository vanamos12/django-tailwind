{% extends "products/layout/base.html" %}
<!--  -->
{% block title %} Produits Simple || {{product.libele}} {% endblock title %}
<!--  -->
{% block content %}
<section class="p-10">
  <div class="flex flex-col md:flex-row gap-10 items-center justify-center">
    <div>
      <img
        class="h-[400px] w-[400px] object-cover rounded-lg shadow-md"
        src="{{ product.image.url }}"
        alt="Produit"
      />
    </div>

    <div class="flex flex-col gap-4 max-w-md">
      <h1 class="text-3xl font-bold text-gray-800">{{ product.libele }}</h1>

      <p class="text-gray-600">{{ product.description }}</p>

      <p class="text-2xl font-semibold text-green-600">
        Prix: {{ product.prix }} F CFA
      </p>

      <a
        href="#"
        class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition text-center"
      >
        Acheter
      </a>
    </div>
  </div>
</section>
{% endblock content %}
