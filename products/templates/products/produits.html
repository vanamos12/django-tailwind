{% extends 'products/layout/base.html' %}
<!--  -->
{% block title %} Produits {% endblock %} {% block content %}

<div class="container mx-auto p-6">
  <div class="flex justify-between items-center">
    <div><h1 class="text-3xl font-bold mb-6">Acceuil</h1></div>
    <div class="text-2xl bg-orange-300 p-1 rounded-lg">
      <a href="{% url 'table' %}">Table poduits</a>
    </div>
  </div>

  <div class="grid grid-cols-3 gap-6">
    {% for product in products %}

    <div class="bg-white rounded-xl shadow p-4">
      <a href="{% url 'detaille' product.id %}">
        <img
          class="w-full h-40 object-cover rounded"
          src="{{ product.image.url }}"
          alt=""
        />
      </a>

      <h2 class="text-xl font-bold mt-2">{{ product.libele }}</h2>

      <p class="text-blue-600 font-semibold">{{ product.prix }} F CFA</p>
    </div>

    {% endfor %}
  </div>
</div>

{% endblock %}
